name: linux build scripts

on:
  workflow_dispatch:
  push:
    branches:
      - development
      - main
    paths:
      - '.github/workflows/linux-build-scripts.yml'
      - 'linux/**'
      - 'scripts/**'
      - 'tools/**'
      - 'linux.sh'
  pull_request:
    branches:
      - development
      - main
    paths:
      - '.github/workflows/linux-build-scripts.yml'
      - 'linux/**'
      - 'scripts/**'
      - 'tools/**'
      - 'linux.sh'

jobs:
  build-main-on-ubuntu-2204:
    name: linux main on ubuntu-22.04
    runs-on: ubuntu-22.04
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - name: prerequisites
        run: sudo apt-get install clang llvm lld libclang-14-dev libstdc++6 nasm autoconf automake libtool pkg-config curl git doxygen rapidjson-dev
      - name: run the build script
        run: ./linux.sh -d
      - name: print build logs
        if: ${{ always() }}
        run: cat build.log
      - name: print ffbuild logs
        if: ${{ failure() }}
        run: '[[ -f ./src/ffmpeg/ffbuild/config.log ]] && tail -50 ./src/ffmpeg/ffbuild/config.log'
      - name: upload artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-kit-linux-main-ubuntu-22.04
          path: |
            linux/*.a
            linux/*.h
            build.log
          retention-days: 7

  build-lts-on-ubuntu-2204:
    name: linux lts on ubuntu 22.04
    runs-on: ubuntu-22.04
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - name: prerequisites
        run: sudo apt-get install clang llvm lld libclang-14-dev libstdc++6 nasm autoconf automake libtool pkg-config curl git doxygen rapidjson-dev
      - name: run the build script
        run: ./linux.sh -d --lts
      - name: print build logs
        if: ${{ always() }}
        run: cat build.log
      - name: print ffbuild logs
        if: ${{ failure() }}
        run: '[[ -f ./src/ffmpeg/ffbuild/config.log ]] && tail -50 ./src/ffmpeg/ffbuild/config.log'
      - name: upload artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-kit-linux-lts-ubuntu-22.04
          path: |
            linux/*.a
            linux/*.h
            build.log
          retention-days: 7
