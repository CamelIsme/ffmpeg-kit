name: android static build scripts

on:
  workflow_dispatch:
    inputs:
      ndk_version:
        description: 'NDK Version'
        required: false
        default: 'r25b'
      ffmpeg_version:
        description: 'FFmpeg Version'
        required: false
        default: '4.4'
  push:
    branches:
      - development
      - main
    paths:
      - '.github/workflows/android-static-build-scripts.yml'
  pull_request:
    branches:
      - development
      - main
    paths:
      - '.github/workflows/android-static-build-scripts.yml'

jobs:
  build-android-static:
    name: android static libs (${{ matrix.arch }}, ${{ matrix.ndk-version }})
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        ndk-version: [ 'r23b', 'r25b' ]
        include:
          - arch: arm64-v8a
            ndk_arch: arm64
            target: aarch64-linux-android
          - arch: armeabi-v7a
            ndk_arch: arm
            target: arm-linux-androideabi
          - arch: x86_64
            ndk_arch: x86_64
            target: x86_64-linux-android
          - arch: x86
            ndk_arch: x86
            target: i686-linux-android
    steps:
      - uses: actions/checkout@v4

      - name: set up jdk 17
        uses: actions/setup-java@v3
        with:
          distribution: 'adopt'
          java-version: '17'

      - name: download NDK
        run: |
          curl -s "https://dl.google.com/android/repository/android-ndk-${{ matrix.ndk-version }}-linux.zip" -o ndk.zip
          unzip -q -o ndk.zip -d .ndk
          echo "NDK_ROOT=$PWD/.ndk/$(ls .ndk)" >> $GITHUB_ENV

      - name: create standalone toolchain for ${{ matrix.arch }}
        run: |
          $NDK_ROOT/build/tools/make-standalone-toolchain.sh \
            --arch=${{ matrix.include.ndk_arch }} \
            --platform=android-21 \
            --install-dir=$PWD/toolchain \
            --force

      - name: download FFmpeg ${{ github.inputs.ffmpeg_version || '4.4' }}
        run: |
          FFmpeg_VERSION="${{ github.inputs.ffmpeg_version || '4.4' }}"
          curl -s "https://ffmpeg.org/releases/ffmpeg-${FFmpeg_VERSION}.tar.xz" -o ffmpeg.tar.xz
          tar -xJf ffmpeg.tar.xz

      - name: configure FFmpeg for ${{ matrix.arch }}
        run: |
          cd ffmpeg-*

          TARGET_CLANG="$PWD/../toolchain/bin/${{ matrix.include.target }}-clang"
          TARGET_CXX="$PWD/../toolchain/bin/${{ matrix.include.target }}-clang++"
          TARGET_AR="$PWD/../toolchain/bin/${{ matrix.include.target }}-ar"
          TARGET_RANLIB="$PWD/../toolchain/bin/${{ matrix.include.target }}-ranlib"
          TARGET_STRIP="$PWD/../toolchain/bin/${{ matrix.include.target }}-strip"
          TARGET_PREFIX="$PWD/../toolchain/bin/${{ matrix.include.target }}-"
          SYSROOT="$PWD/../toolchain/sysroot"

          ./configure \
            --prefix=$PWD/../output/${{ matrix.arch }} \
            --target-os=android \
            --arch=${{ matrix.arch }} \
            --enable-cross-compile \
            --cross-prefix="$TARGET_PREFIX" \
            --sysroot="$SYSROOT" \
            --cc="$TARGET_CLANG" \
            --cxx="$TARGET_CXX" \
            --ar="$TARGET_AR" \
            --ranlib="$TARGET_RANLIB" \
            --strip="$TARGET_STRIP" \
            --extra-cflags="--target=${{ matrix.include.target }} --sysroot=$SYSROOT" \
            --extra-ldflags="--target=${{ matrix.include.target }} --sysroot=$SYSROOT" \
            --enable-static \
            --disable-shared \
            --disable-doc \
            --disable-programs \
            --enable-pic \
            --enable-small \
            --disable-avdevice \
            --disable-avfilter \
            --disable-postproc \
            --disable-network \
            --disable-everything \
            --enable-decoder=h264 \
            --enable-decoder=mpeg4 \
            --enable-decoder=vp8 \
            --enable-decoder=vp9 \
            --enable-decoder=hevc \
            --enable-demuxer=mov \
            --enable-demuxer=matroska \
            --enable-protocol=file \
            --enable-swscale \
            --enable-avcodec \
            --enable-avutil \
            --enable-swresample \
            --enable-avformat

      - name: build FFmpeg static libraries
        run: |
          cd ffmpeg-*
          make -j$(nproc)
          make install

      - name: upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-android-static-${{ matrix.arch }}-${{ matrix.ndk-version }}
          path: |
            output/${{ matrix.arch }}/lib/*.a
            output/${{ matrix.arch }}/include/**
          retention-days: 7

  build-android-static-full:
    name: android static libs (full, ${{ matrix.arch }}, ${{ matrix.ndk-version }})
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        ndk-version: [ 'r25b' ]
        include:
          - arch: arm64-v8a
            ndk_arch: arm64
            target: aarch64-linux-android
          - arch: armeabi-v7a
            ndk_arch: arm
            target: arm-linux-androideabi
    steps:
      - uses: actions/checkout@v4

      - name: set up jdk 17
        uses: actions/setup-java@v3
        with:
          distribution: 'adopt'
          java-version: '17'

      - name: download NDK
        run: |
          curl -s "https://dl.google.com/android/repository/android-ndk-${{ matrix.ndk-version }}-linux.zip" -o ndk.zip
          unzip -q -o ndk.zip -d .ndk
          echo "NDK_ROOT=$PWD/.ndk/$(ls .ndk)" >> $GITHUB_ENV

      - name: create standalone toolchain for ${{ matrix.arch }}
        run: |
          $NDK_ROOT/build/tools/make-standalone-toolchain.sh \
            --arch=${{ matrix.include.ndk_arch }} \
            --platform=android-21 \
            --install-dir=$PWD/toolchain \
            --force

      - name: download FFmpeg 4.4 LTS
        run: |
          curl -s "https://ffmpeg.org/releases/ffmpeg-4.4.tar.xz" -o ffmpeg.tar.xz
          tar -xJf ffmpeg.tar.xz

      - name: configure FFmpeg full build
        run: |
          cd ffmpeg-4.4

          TARGET_CLANG="$PWD/../toolchain/bin/${{ matrix.include.target }}-clang"
          TARGET_CXX="$PWD/../toolchain/bin/${{ matrix.include.target }}-clang++"
          TARGET_AR="$PWD/../toolchain/bin/${{ matrix.include.target }}-ar"
          TARGET_RANLIB="$PWD/../toolchain/bin/${{ matrix.include.target }}-ranlib"
          TARGET_STRIP="$PWD/../toolchain/bin/${{ matrix.include.target }}-strip"
          TARGET_PREFIX="$PWD/../toolchain/bin/${{ matrix.include.target }}-"
          SYSROOT="$PWD/../toolchain/sysroot"

          ./configure \
            --prefix=$PWD/../output/${{ matrix.arch }} \
            --target-os=android \
            --arch=${{ matrix.arch }} \
            --enable-cross-compile \
            --cross-prefix="$TARGET_PREFIX" \
            --sysroot="$SYSROOT" \
            --cc="$TARGET_CLANG" \
            --cxx="$TARGET_CXX" \
            --ar="$TARGET_AR" \
            --ranlib="$TARGET_RANLIB" \
            --strip="$TARGET_STRIP" \
            --extra-cflags="--target=${{ matrix.include.target }} --sysroot=$SYSROOT" \
            --extra-ldflags="--target=${{ matrix.include.target }} --sysroot=$SYSROOT" \
            --enable-static \
            --disable-shared \
            --disable-doc \
            --disable-programs \
            --enable-pic \
            --enable-gpl \
            --enable-nonfree \
            --enable-decoder=h264 \
            --enable-decoder=mpeg4 \
            --enable-decoder=vp8 \
            --enable-decoder=vp9 \
            --enable-decoder=hevc \
            --enable-decoder=aac \
            --enable-decoder=mp3 \
            --enable-decoder=vorbis \
            --enable-decoder=opus \
            --enable-demuxer=mov \
            --enable-demuxer=matroska \
            --enable-demuxer=avi \
            --enable-demuxer=mkv \
            --enable-protocol=file \
            --enable-swscale \
            --enable-avcodec \
            --enable-avutil \
            --enable-swresample \
            --enable-avformat

      - name: build FFmpeg
        run: |
          cd ffmpeg-4.4
          make -j$(nproc)
          make install

      - name: upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-android-static-full-${{ matrix.arch }}-${{ matrix.ndk-version }}
          path: |
            output/${{ matrix.arch }}/lib/*.a
            output/${{ matrix.arch }}/include/**
            output/${{ matrix.arch }}/bin/**
          retention-days: 7
