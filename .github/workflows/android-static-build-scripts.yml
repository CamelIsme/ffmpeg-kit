name: android static build scripts

on:
  workflow_dispatch:
    inputs:
      ndk_version:
        description: 'NDK Version'
        required: false
        default: 'r25b'
      ffmpeg_version:
        description: 'FFmpeg Version'
        required: false
        default: '4.4'
  push:
    branches:
      - development
      - main
    paths:
      - '.github/workflows/android-static-build-scripts.yml'
  pull_request:
    branches:
      - development
      - main
    paths:
      - '.github/workflows/android-static-build-scripts.yml'

jobs:
  build-android-static:
    name: android static libs (${{ matrix.arch }}, ${{ matrix.ndk-version }})
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        ndk-version: [ 'r23b', 'r25b' ]
        include:
          - arch: arm64-v8a
            clang_target: aarch64-linux-android21
            toolchain_dir: aarch64
          - arch: armeabi-v7a
            clang_target: armv7a-linux-androideabi21
            toolchain_dir: arm
          - arch: x86_64
            clang_target: x86_64-linux-android21
            toolchain_dir: x86_64
          - arch: x86
            clang_target: i686-linux-android21
            toolchain_dir: x86
    steps:
      - uses: actions/checkout@v4

      - name: set up jdk 17
        uses: actions/setup-java@v3
        with:
          distribution: 'adopt'
          java-version: '17'

      - name: download NDK
        run: |
          curl -s "https://dl.google.com/android/repository/android-ndk-${{ matrix.ndk-version }}-linux.zip" -o ndk.zip
          unzip -q -o ndk.zip -d .ndk
          echo "NDK_ROOT=$PWD/.ndk/$(ls .ndk)" >> $GITHUB_ENV

      - name: download FFmpeg ${{ github.inputs.ffmpeg_version || '4.4' }}
        run: |
          FFmpeg_VERSION="${{ github.inputs.ffmpeg_version || '4.4' }}"
          curl -s "https://ffmpeg.org/releases/ffmpeg-${FFmpeg_VERSION}.tar.xz" -o ffmpeg.tar.xz
          tar -xJf ffmpeg.tar.xz

      - name: configure FFmpeg for ${{ matrix.arch }}
        run: |
          cd ffmpeg-*

          SYSROOT="$NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/sysroot"
          CC="$NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin/${{ matrix.clang_target }}-clang"
          AR="$NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar"
          RANLIB="$NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ranlib"
          STRIP="$NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip"

          ./configure \
            --prefix=$PWD/../output/${{ matrix.arch }} \
            --target-os=android \
            --arch=${{ matrix.arch }} \
            --cc="$CC" \
            --ar="$AR" \
            --ranlib="$RANLIB" \
            --strip="$STRIP" \
            --sysroot="$SYSROOT" \
            --enable-static \
            --disable-shared \
            --disable-doc \
            --disable-programs \
            --enable-pic \
            --enable-small \
            --disable-avdevice \
            --disable-avfilter \
            --disable-postproc \
            --disable-network \
            --disable-everything \
            --enable-decoder=h264 \
            --enable-decoder=mpeg4 \
            --enable-decoder=vp8 \
            --enable-decoder=vp9 \
            --enable-decoder=hevc \
            --enable-demuxer=mov \
            --enable-demuxer=matroska \
            --enable-protocol=file \
            --enable-swscale \
            --enable-avcodec \
            --enable-avutil \
            --enable-swresample \
            --enable-avformat

      - name: build FFmpeg static libraries
        run: |
          cd ffmpeg-*
          make -j$(nproc)
          make install

      - name: upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-android-static-${{ matrix.arch }}-${{ matrix.ndk-version }}
          path: |
            output/${{ matrix.arch }}/lib/*.a
            output/${{ matrix.arch }}/include/**
          retention-days: 7

  build-android-static-full:
    name: android static libs (full, ${{ matrix.arch }}, ${{ matrix.ndk-version }})
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        ndk-version: [ 'r25b' ]
        include:
          - arch: arm64-v8a
            clang_target: aarch64-linux-android21
            toolchain_dir: aarch64
          - arch: armeabi-v7a
            clang_target: armv7a-linux-androideabi21
            toolchain_dir: arm
    steps:
      - uses: actions/checkout@v4

      - name: set up jdk 17
        uses: actions/setup-java@v3
        with:
          distribution: 'adopt'
          java-version: '17'

      - name: download NDK
        run: |
          curl -s "https://dl.google.com/android/repository/android-ndk-${{ matrix.ndk-version }}-linux.zip" -o ndk.zip
          unzip -q -o ndk.zip -d .ndk
          echo "NDK_ROOT=$PWD/.ndk/$(ls .ndk)" >> $GITHUB_ENV

      - name: download FFmpeg 4.4 LTS
        run: |
          curl -s "https://ffmpeg.org/releases/ffmpeg-4.4.tar.xz" -o ffmpeg.tar.xz
          tar -xJf ffmpeg.tar.xz

      - name: configure FFmpeg full build
        run: |
          cd ffmpeg-4.4

          SYSROOT="$NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/sysroot"
          CC="$NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin/${{ matrix.clang_target }}-clang"
          AR="$NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar"
          RANLIB="$NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ranlib"
          STRIP="$NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip"

          ./configure \
            --prefix=$PWD/../output/${{ matrix.arch }} \
            --target-os=android \
            --arch=${{ matrix.arch }} \
            --cc="$CC" \
            --ar="$AR" \
            --ranlib="$RANLIB" \
            --strip="$STRIP" \
            --sysroot="$SYSROOT" \
            --enable-static \
            --disable-shared \
            --disable-doc \
            --disable-programs \
            --enable-pic \
            --enable-gpl \
            --enable-nonfree \
            --enable-decoder=h264 \
            --enable-decoder=mpeg4 \
            --enable-decoder=vp8 \
            --enable-decoder=vp9 \
            --enable-decoder=hevc \
            --enable-decoder=aac \
            --enable-decoder=mp3 \
            --enable-decoder=vorbis \
            --enable-decoder=opus \
            --enable-demuxer=mov \
            --enable-demuxer=matroska \
            --enable-demuxer=avi \
            --enable-demuxer=mkv \
            --enable-protocol=file \
            --enable-swscale \
            --enable-avcodec \
            --enable-avutil \
            --enable-swresample \
            --enable-avformat

      - name: build FFmpeg
        run: |
          cd ffmpeg-4.4
          make -j$(nproc)
          make install

      - name: upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-android-static-full-${{ matrix.arch }}-${{ matrix.ndk-version }}
          path: |
            output/${{ matrix.arch }}/lib/*.a
            output/${{ matrix.arch }}/include/**
            output/${{ matrix.arch }}/bin/**
          retention-days: 7
