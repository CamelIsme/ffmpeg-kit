name: android static build scripts

on:
  workflow_dispatch:
  push:
    branches:
      - development
      - main
    paths:
      - '.github/workflows/android-static-build-scripts.yml'
  pull_request:
    branches:
      - development
      - main
    paths:
      - '.github/workflows/android-static-build-scripts.yml'

jobs:
  build-android-static:
    name: android static libs (${{ matrix.arch }}, ${{ matrix.ndk-version }})
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        ndk-version: [ 'r25b-linux' ]
        arch: [ 'arm64-v8a', 'x86_64' ]
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: set up adopt jdk 17
        uses: actions/setup-java@v3
        with:
          distribution: 'adopt'
          java-version: '17'

      - name: set up android ndk
        run: |
          curl -s "https://dl.google.com/android/repository/android-ndk-${{ matrix.ndk-version }}.zip" -o ndk.zip
          unzip -q -o ndk.zip -d .ndk
          echo "ANDROID_NDK_ROOT=$PWD/.ndk/$(ls .ndk)" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV

      - name: download FFmpeg 4.4 LTS
        run: |
          curl -s "https://ffmpeg.org/releases/ffmpeg-4.4.tar.xz" -o ffmpeg.tar.xz
          tar -xJf ffmpeg.tar.xz

      - name: configure FFmpeg for ${{ matrix.arch }}
        run: |
          cd ffmpeg-4.4

          NDK="$ANDROID_NDK_ROOT"
          TOOLCHAIN="$NDK/toolchains/llvm/prebuilt/linux-x86_64"
          SYSROOT="$TOOLCHAIN/sysroot"
          API=21

          if [[ "${{ matrix.arch }}" == "arm64-v8a" ]]; then
            TARGET_HOST="aarch64-linux-android"
          else
            TARGET_HOST="x86_64-linux-android"
          fi

          OUTPUT_DIR="$GITHUB_WORKSPACE/output/${{ matrix.arch }}"
          mkdir -p "$OUTPUT_DIR"

          CC="$TOOLCHAIN/bin/$TARGET_HOST$API-clang"
          AR="$TOOLCHAIN/bin/llvm-ar"
          RANLIB="$TOOLCHAIN/bin/llvm-ranlib"
          STRIP="$TOOLCHAIN/bin/llvm-strip"

          export CC AR RANLIB STRIP
          export CFLAGS="--sysroot=$SYSROOT -target $TARGET_HOST$API -DANDROID -DNDEBUG"
          export LDFLAGS="--sysroot=$SYSROOT -target $TARGET_HOST$API"
          export PKG_CONFIG_LIBDIR="$SYSROOT/usr/lib/pkgconfig"
          export PKG_CONFIG_SYSROOT_DIR="$SYSROOT"

          ./configure \
            --prefix=$OUTPUT_DIR \
            --target-os=android \
            --arch=$ARCH \
            --enable-cross-compile \
            --sysroot="$SYSROOT" \
            --cc="$CC" \
            --enable-static \
            --disable-shared \
            --disable-doc \
            --disable-programs \
            --enable-pic \
            --disable-avdevice \
            --disable-avfilter \
            --disable-postproc \
            --disable-network \
            --disable-x86asm \
            --disable-everything \
            --enable-decoder=h264 \
            --enable-decoder=mpeg4 \
            --enable-decoder=vp8 \
            --enable-decoder=vp9 \
            --enable-decoder=hevc \
            --enable-demuxer=mov \
            --enable-demuxer=matroska \
            --enable-protocol=file \
            --enable-swscale \
            --enable-avcodec \
            --enable-avutil \
            --enable-swresample \
            --enable-avformat

      - name: build FFmpeg static libraries
        run: |
          cd ffmpeg-4.4
          make -j$(nproc)
          make install

      - name: upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-android-static-${{ matrix.arch }}-${{ matrix.ndk-version }}
          path: |
            output/${{ matrix.arch }}/lib/*.a
            output/${{ matrix.arch }}/include/**
          retention-days: 7
