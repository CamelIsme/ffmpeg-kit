  build-main-on-macos-monterey:
    name: ios main on monterey
    runs-on: macos-12
    env:
      IOS_MIN_VERSION: "12.0"
    strategy:
      matrix:
        xcode: [ '13.4.1' ]
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
